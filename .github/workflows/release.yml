name: Release
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: chmod +x build_zipapp.sh && ./build_zipapp.sh
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/aigon.pyz
